server:
  port: ${APP_PORT}

spring:
  application:
    name: msa-meerkatgram-v2-auth
    version: v1
  web:
    error:
      include-stacktrace: always
      include-message: always

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

  # DB
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000

  # JPA
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
    defer-datasource-initialization: true
  sql:
    init:
      data-locations: classpath*:dummy/*.sql
      mode: always
      platform: all

# Springdoc Openapi
springdoc:
  default-consumes-media-type: application/json
  default-produces-media-type: application/json
  swagger-ui:
    enabled: false
  api-docs:
    path: /api-docs
  open-api:
    servers:
      - url: ${GATEWAY_URI}
        description: ${APP_DESCRIPTION}

# Log
logging:
  file:
    name: logs/error.log
  level:
    root: info
    com.msameerkatgramv2auth.controllers: debug
    com.msameerkatgramv2auth.global.errors: debug

# JWT
jwt:
  secure: false
  issuer: meerkat@meerkat.kr
  type: JWT
  access-token-expiry: 100000000
  refresh-token-expiry: 1296000000
  refresh-token-cookie-name: refresh-token
  refresh-token-cookie-expiry: 1296000
  secret: ${JWT_SECRET}
  header-key: Authorization
  scheme: Bearer
  reissue-uri: /api/auth/reissue-token

# file
file:
  server-uri: ${FILE_SERVER_URI}
  storage-path: ${FILE_STORAGE_PATH}
  profile-path: /auth/files/profiles
  allow-extension-list: [
    "image/jpg",
    "image/jpeg",
    "image/png",
    "image/gif",
    "image/svg",
    "image/webp"
  ]